<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Blu's Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#120f26;
    --card:#292350;
    --card-2:#332b62;
    --accent:#F4B942;
    --accent-soft:#FFDD8A;
    --text:#F6F1E6;
    --text-dim:#B7ACD6;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:radial-gradient(ellipse at top, #241f47 0%, var(--bg-deep) 70%);
    color:var(--text);
    font-family:'Nunito', sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow-x:hidden;
    user-select:none;
  }
  .stars-bg{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      radial-gradient(1.5px 1.5px at 20px 30px, #ffffff55, transparent),
      radial-gradient(1.5px 1.5px at 120px 90px, #ffffff33, transparent),
      radial-gradient(1px 1px at 200px 40px, #ffffff44, transparent),
      radial-gradient(1.5px 1.5px at 260px 130px, #ffffff33, transparent),
      radial-gradient(1px 1px at 320px 60px, #ffffff55, transparent),
      radial-gradient(1.5px 1.5px at 60px 160px, #ffffff33, transparent);
    background-repeat:repeat;
    background-size:360px 200px;
  }
  .wrap{
    position:relative; z-index:1; width:100%; max-width:480px;
    display:flex; flex-direction:column; align-items:center;
    padding:32px 20px 40px;
  }
  .logo{
    width:min(70vw, 260px); height:auto; margin-bottom:6px;
    filter:drop-shadow(0 8px 20px rgba(0,0,0,0.4));
  }
  .tagline{
    color:var(--text-dim); text-align:center; font-weight:700; font-size:14px;
    margin:0 0 30px;
  }
  .game-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:16px;
    width:100%;
  }
  .game-tile{
    aspect-ratio:1; border-radius:20px; border:none; cursor:pointer;
    background:linear-gradient(160deg, var(--card-2), var(--card));
    box-shadow:0 4px 0 #14102b, 0 10px 20px rgba(0,0,0,0.35);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    padding:14px; text-decoration:none;
    transition:transform .08s ease;
  }
  .game-tile:active{ transform:translateY(3px); box-shadow:0 1px 0 #14102b, 0 4px 10px rgba(0,0,0,0.3); }
  .game-tile .icon{ font-size:40px; }
  .game-tile .tile-img{
    width:64%; aspect-ratio:1; object-fit:contain;
    border-radius:14px;
  }
  .game-tile .name{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:15px;
    color:var(--text); text-align:center; line-height:1.2;
  }
  .game-tile.soon{
    background:var(--card); box-shadow:none; opacity:0.45; cursor:default;
  }
  .game-tile.soon .name{ color:var(--text-dim); font-size:13px; }
</style>
</head>
<body>
<div class="stars-bg"></div>
<div class="wrap">
  <img class="logo" src="assets/blu-logo-full.png" alt="Blu's Arcade">
  <div class="tagline">Pick a game</div>

  <div class="game-grid">
    <a class="game-tile" href="games/hoot-and-holler.html">
      <img class="tile-img" src="assets/hoot-and-holler-logo.png" alt="Hoot & Holler">
      <span class="name">Hoot &amp; Holler</span>
    </a>
    <div class="game-tile soon">
      <span class="icon">🔒</span>
      <span class="name">More coming soon</span>
    </div>
  </div>
</div>
</body>
</html>
